services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - backend-public:/var/www/backend/public:ro
    depends_on:
      - backend
    restart: always
    networks:
      - dukkan

  backend:
    build:
      context: /opt/dukkan
      dockerfile: infra_haritna/production/dukkan/backend/Dockerfile
    expose:
      - "9000"
    env_file: /opt/dukkan/.env
    volumes:
      - backend-storage:/var/www/storage/app
      - backend-public:/var/www/public
    depends_on:
      - redis
    restart: always
    networks:
      - dukkan

  queue-worker:
    build:
      context: /opt/dukkan
      dockerfile: infra_haritna/production/dukkan/backend/Dockerfile
    command: php artisan queue:work redis --tries=3 --timeout=90 --sleep=3
    env_file: /opt/dukkan/.env
    depends_on:
      - redis
      - backend
    restart: always
    networks:
      - dukkan

  scheduler:
    build:
      context: /opt/dukkan
      dockerfile: infra_haritna/production/dukkan/backend/Dockerfile
    command: sh -c "while true; do php artisan schedule:run --no-interaction >> /dev/null 2>&1; sleep 60; done"
    env_file: /opt/dukkan/.env
    depends_on:
      - redis
      - backend
    restart: always
    networks:
      - dukkan

  frontend:
    build:
      context: /opt/dukkan
      dockerfile: infra_haritna/production/dukkan/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: https://api.dukkan.haritna.net
    expose:
      - "3000"
    env_file: /opt/dukkan/.env
    restart: always
    networks:
      - dukkan

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    restart: always
    networks:
      - dukkan

volumes:
  backend-storage:
  backend-public:
  redis-data:

networks:
  dukkan:
    driver: bridge
