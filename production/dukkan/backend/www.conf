[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Slow log for debugging
slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s

; Security
clear_env = no
catch_workers_output = yes
decorate_workers_output = no
